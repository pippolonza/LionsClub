<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notizie - Lions Club Mirandola</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background-color: #f1f5f9; 
            color: #0d0c22; 
        }

        /* ==========================================================================
           PARTE DA NON TOCCARE (BARRA SUPERIORE, NAV E HERO ORIGINALE)
           ========================================================================== */
        .top-yellow-bar {
            background-color: #FFC82E;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 12px;
            font-weight: 800;
        }
        .top-yellow-bar .left-text { text-transform: none; }
        .top-yellow-bar .header-brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .top-yellow-bar .header-brand img {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            display: block;
        }
        .top-yellow-bar .right-links { display: flex; gap: 20px; text-transform: uppercase; }
        .top-yellow-bar .right-links a { color: #000; text-decoration: none; }

        .main-nav {
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-links { display: flex; gap: 8px; }
        .nav-item {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #000;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-item.active { background: black; color: white; }
        .nav-item:hover:not(.active) { background: #f8f8f8; }

        .right-btns { display: flex; gap: 12px; align-items: center; }
        .btn-lilla { background: #D6C6F9; padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; }
        .btn-gold { background: #FFC82E; padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; border: none; cursor: pointer; }

        /* ==========================================================================
           FILTRI E STILE DELLE CARD ORIZZONTALI (ALLARGATE E CON CONTRASTO)
           ========================================================================== */
        .filter-btn {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn:hover:not(.active) {
            background-color: #0d0c22;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background-color: #034EA2;
            color: #ffffff;
            border-color: #034EA2;
            box-shadow: 0 6px 20px rgba(3, 78, 162, 0.4);
        }
        .notizie-filter-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }
        @media (max-width: 640px) {
            .notizie-filter-controls {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 0.35rem;
            }
            .notizie-filter-controls .filter-btn {
                min-height: 44px;
                padding: 0.65rem 0.35rem;
                font-size: 9px;
                line-height: 1.05;
                text-align: center;
                white-space: normal;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .main-content-area {
            max-width: 1240px;
        }

        .news-card {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        @media (min-width: 768px) {
            .news-card {
                flex-direction: row;
                height: 290px;
            }
        }

        .news-card.cat-prima-pagina:hover {
            transform: translateY(-6px);
            border-color: #034EA2;
            box-shadow: 0 20px 35px -10px rgba(3, 78, 162, 0.2);
        }
        .news-card.cat-prima-pagina:hover .news-title {
            color: #034EA2;
        }

        .news-card.cat-rassegna-stampa:hover {
            transform: translateY(-6px);
            border-color: #FFC72C;
            box-shadow: 0 20px 35px -10px rgba(212, 160, 23, 0.3);
        }
        .news-card.cat-rassegna-stampa:hover .news-title {
            color: #d4a017;
        }

        .news-img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #cbd5e1;
        }

        @media (min-width: 768px) {
            .news-img-wrapper {
                width: 380px;
                height: 100%;
            }
        }

        .news-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .news-img-wrapper img {
            transform: scale(1.06);
        }

        /* Animazioni Finestre Modal */
        #detailOverlay, #imageLightbox {
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #detailModal {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div class="top-yellow-bar">
        <div class="left-text header-brand">
            <img src="favicon.png" alt="" aria-hidden="true">
            <span>Lions Club Mirandola</span>
        </div>
        <div class="right-links">
            <a href="#">LIONS Ai ✦</a>
            <a href="#">Lions Portal</a>
            <a href="#">Contatti</a>
            <a href="#">IT ▼</a>
        </div>
    </div>

    <nav class="main-nav">
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="chi-siamo.html" class="nav-item">Chi Siamo</a>
            <a href="#" class="nav-item active">Notizie</a>
            <a href="galleria.html" class="nav-item">Galleria</a>
            <a href="#" class="nav-item">Trova i Club</a>
        </div>
        <div class="right-btns">
            <button class="btn-lilla">DIVENTA LIONS</button>
            <button class="btn-gold"><span style="color: black;">🖤</span> DONA</button>
        </div>
    </nav>

    <main>
        <section class="relative h-[65vh] min-h-[500px] flex items-center overflow-hidden">
            <div class="absolute inset-0 bg-cover bg-center" style="background-image:url('notizie-hero.jpg')">
                <div class="absolute inset-0 bg-black/65"></div>
            </div>

            <div class="relative z-10 container mx-auto px-6">
                <div class="max-w-4xl">
                    <p class="text-[#FFC72C] font-black uppercase tracking-[0.3em] mb-6 text-sm">
                        Cronaca & Impatto nel Territorio
                    </p>

                    <h1 class="text-white text-6xl md:text-8xl font-black uppercase leading-[0.9] tracking-tighter mb-8">
                        Notizie & <span class="text-[#FFC72C]">Attività</span>
                    </h1>

                    <p class="text-white/90 text-xl md:text-2xl font-medium leading-relaxed max-w-3xl">
                        Le voci della nostra comunità, le iniziative in corso e i comunicati della rassegna stampa ufficiale del Lions Club Mirandola.
                    </p>
                </div>
            </div>
        </section>

        <section class="py-8 bg-white sticky top-0 z-30 border-b border-gray-300 shadow-md backdrop-blur-md bg-white/90">
            <div class="container mx-auto px-6 max-w-5xl">
                <div class="notizie-filter-controls">
                    <button onclick="filterFeed('all', this)" class="filter-btn active px-7 py-3 bg-white text-black border border-gray-300 rounded-full text-xs font-bold uppercase tracking-wider">
                        Tutte le Notizie
                    </button>
                    <button onclick="filterFeed('prima-pagina', this)" class="filter-btn px-7 py-3 bg-white text-black border border-gray-300 rounded-full text-xs font-bold uppercase tracking-wider">
                        Prima Pagina
                    </button>
                    <button onclick="filterFeed('rassegna-stampa', this)" class="filter-btn px-7 py-3 bg-white text-black border border-gray-300 rounded-full text-xs font-bold uppercase tracking-wider">
                        Rassegna Stampa
                    </button>
                </div>
            </div>
        </section>

        <section class="py-16">
            <div class="container mx-auto px-6 main-content-area">
                <div class="flex flex-col gap-8" id="newsTimelineContainer">
                    </div>
            </div>
        </section>
    </main>

    <div id="detailOverlay" class="fixed inset-0 bg-black/80 z-40 flex justify-end opacity-0 pointer-events-none backdrop-blur-md" onclick="closeNews()">
        <div id="detailModal" class="w-full max-w-2xl bg-[#f8fafc] h-full overflow-y-auto p-8 md:p-12 shadow-2xl translate-x-full flex flex-col justify-between" onclick="event.stopPropagation()">
            <div>
                <div class="flex justify-between items-center mb-8">
                    <span id="modalTag" class="text-xs font-bold px-4 py-1.5 rounded-full uppercase tracking-wider"></span>
                    <button onclick="closeNews()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200 text-slate-700 hover:bg-red-600 hover:text-white transition-all text-2xl shadow-sm font-light">
                        &times;
                    </button>
                </div>
                <p id="modalDate" class="text-sm text-slate-400 font-bold mb-2"></p>
                <h2 id="modalTitle" class="text-2xl md:text-4xl font-black text-[#0d0c22] uppercase tracking-tight mb-6 leading-tight"></h2>
                
                <div class="w-full h-64 md:h-80 rounded-2xl overflow-hidden mb-8 shadow-md">
                    <img id="modalImg" src="" class="w-full h-full object-cover cursor-zoom-in hover:scale-[1.03] transition-transform duration-300 ease-in-out" alt="Immagine Notizia" onclick="openLightbox(this.src)">
                </div>
                
                <div id="modalContent" class="text-slate-600 font-medium text-base md:text-lg leading-relaxed space-y-4"></div>
            </div>
            <div class="mt-12 pt-6 border-t border-slate-200 flex justify-end">
                <button onclick="closeNews()" class="px-8 py-3.5 bg-[#0d0c22] text-white text-xs font-bold uppercase rounded-full tracking-widest hover:bg-opacity-90 transition-all shadow-md">Torna all'elenco notizie</button>
            </div>
        </div>
    </div>

    <div id="imageLightbox" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 cursor-zoom-out" onclick="closeLightbox()">
        <img id="lightboxImg" src="" class="max-w-[95vw] max-h-[95vh] object-contain rounded-lg shadow-2xl" alt="Immagine ingrandita">
    </div>

    <script>
        // Classi per le immagini che attivano l'ingrandimento
        const imgClasses = "w-full h-64 rounded-2xl shadow-md object-cover cursor-zoom-in hover:scale-[1.03] transition-transform duration-300 ease-in-out";

        const newsDatabase = [
    {
        title: "\"Giovani Chef in cucina\": il LC Mirandola all'Istituto Greggiati di Poggio Rusco",
        date: "03 Giu 2026",
        category: "prima-pagina",
        tag: "Prima Pagina",
        tagClass: "bg-[#034EA2]/10 text-[#034EA2]",
        cardClass: "cat-prima-pagina",
        img: "Notizie/giovani-chef-greggiati-800x445.jpg",
        excerpt: "Il service del Lions Club Mirandola ha coinvolto gli studenti dell'Istituto Greggiati in una gara di cucina dedicata alla pasta fresca...",
        content: `
            <p>Il 15 maggio 2026 il Lions Club Mirandola ha portato il service "Giovani Chef in cucina" all'Istituto di Istruzione Superiore G. Greggiati di Poggio Rusco, coinvolgendo gli studenti degli ultimi anni in una prova pratica dedicata alla pasta fresca.</p>
            <p>Gli studenti, divisi in tre gruppi, hanno ideato, preparato e servito i propri piatti a una giuria composta da insegnanti e soci Lions. L'iniziativa ha unito tecnica, creativita e valorizzazione della cultura agroalimentare del territorio, in linea con il percorso formativo dell'istituto.</p>
            <p>I piatti presentati hanno messo in evidenza materie prime di stagione e abbinamenti originali. La votazione, svolta tramite smartphone, ha premiato il secondo piatto per poche lunghezze sugli altri, confermando l'alto livello di preparazione di tutti i gruppi in gara.</p>
            <p>Il Lions Club Mirandola ha sostenuto la scuola con una donazione destinata a borse di studio per i tre gruppi e all'acquisto di materiale scolastico e attrezzature per la cucina dell'istituto.</p>
            <div class="mt-8 grid grid-cols-1 gap-4">
                <img src="Notizie/giovani-chef-greggiati-800x445.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
            </div>
        `
    },
    {
        title: "Premiati i disegni meritevoli sul tema dell'Acqua, promosso dai Lions, alla Scuola Media Montanari di Mirandola",
        date: "30 Mag 2026",
        category: "prima-pagina",
        tag: "Prima Pagina",
        tagClass: "bg-[#034EA2]/10 text-[#034EA2]",
        cardClass: "cat-prima-pagina",
        img: "Notizie/acqua-montanari-premiazione.png",
        excerpt: "Lo scorso 26 maggio presso la Scuola Media Montanari di Mirandola si è svolta la premiazione dei dieci alunni più meritevoli...",
        content: `
            <p>Lo scorso 26 maggio presso la Scuola Media Montanari di Mirandola, si è svolta la premiazione dei dieci alunni più meritevoli per aver eseguito disegni sul tema dell'Acqua, nell'ambito dell'omonimo progetto promosso dal Distretto Lions 108Tb, di cui fa parte il Lions Club Mirandola.</p>
            <p>La premiazione è avvenuta alla presenza degli ospiti Lions: Lorella Ansaloni, socia del Lions Club Mirandola e Coordinatrice Distrettuale dell'Area Ambiente, Sergio Vaiani, Coordinatore del progetto Acqua, ed Enzo Ragazzi, presidente del Lions Club Mirandola.</p>
            <p>Dopo un breve intervento di Sergio Vaiani sull'importanza dell'acqua nelle sue mille sfaccettature, Enzo Ragazzi ha spiegato in breve le finalità dei Lions e le otto cause umanitarie che essi perseguono in ogni parte del mondo. Infine Lorella Ansaloni ha parlato dell'ambiente e delle problematiche che si incontrano non avendone cura, ricordando che la terra ci è pervenuta e dobbiamo consegnarla, possibilmente non degradata, alle generazioni future.</p>
            <p>Si è proceduto, poi, alla premiazione delle opere più meritevoli e originali, riconoscendo a ciascuno dei giovani autori un attestato di partecipazione e, alla scuola, un buono per l'acquisto di materiale scolastico. Il tutto si è svolto in un'atmosfera di serena convivenza e piacevole condivisione, cui hanno preso parte anche la D.ssa Morselli, preside, e altri insegnanti dei ragazzi.</p>
            <div class="mt-8 grid grid-cols-1 gap-4">
                <img src="Notizie/acqua-montanari-premiazione.png" class="${imgClasses}" onclick="openLightbox(this.src)">
            </div>
        `
    },
    {
        title: "Due importanti services a favore dei giovani, compiuti in maggio dal Lions Club Mirandola, nelle scuole del territorio",
        date: "30 Mag 2026",
        category: "prima-pagina",
        tag: "Prima Pagina",
        tagClass: "bg-[#034EA2]/10 text-[#034EA2]",
        cardClass: "cat-prima-pagina",
        img: "Notizie/services-giovani-orto.png",
        excerpt: "Due importanti services a favore dei giovani sono stati compiuti in maggio dal Lions Club Mirandola nelle scuole del territorio...",
        content: `
            <p>Il primo service si è svolto l'8 maggio presso le scuole primarie di Medolla ed è consistito nella creazione di un orto didattico nel giardino intorno alla scuola. Ha visto impegnati nella preparazione della terra e nella piantumazione delle pianticelle da fiore e da orto gli alunni della classi quarte.</p>
            <p>Il progetto è stato curato da Lorella Ansaloni, socia del Lions Club Mirandola e coordinatrice dell'Area Ambiente del Distretto Lions 108Tb. Lorella ha spiegato ai ragazzi il valore della salvaguardia dell'ambiente con la sua biodiversità, che racchiude la complessità della vita sulla Terra da cui dipende direttamente la sopravvivenza dell'uomo.</p>
            <p>Appassionarsi fin dall'età giovanile alla salvaguardia dell'ambiente con esperienze pratiche e dirette, come la cura delle piante e dei fiori, è molto importante. In effetti, gli alunni si sono applicati subito al lavoro di giardinieri loro assegnato con dedizione e hanno condotto a termine l'opera con un entusiasmo che aumenterà certamente quando, fra qualche tempo, ne vedranno, con orgoglio, gli sviluppi: la natura è infatti generosa con chi dimostra di stare dalla sua parte.</p>
            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                <figure>
                    <img src="Notizie/services-giovani-orto.png" class="${imgClasses}" onclick="openLightbox(this.src)">
                    <figcaption class="mt-2 text-sm text-gray-500 italic">Gli alunni al lavoro, mentre sullo sfondo Enzo Ragazzi, Lorella Ansaloni e le insegnanti sovrintendono.</figcaption>
                </figure>
                <img src="Notizie/services-giovani-orto-2.png" class="${imgClasses}" onclick="openLightbox(this.src)">
            </div>
            <p>Il secondo service ha avuto luogo l'11 maggio presso l'Auditorium Rita Levi-Montalcini e ha riguardato l'educazione alla sicurezza stradale per gli studenti delle classi quarte di due delle scuole secondarie superiori di Mirandola, cioè l'Istituto Galilei e il Liceo Giovanni Pico.</p>
            <p>Una volta tanto, l'importante argomento non è stato trattato con una lezione frontale, magari noiosa e poco interessante, ma sotto forma di vero e proprio spettacolo teatrale dal titolo On the road, nel quale il bravissimo attore Daniele Goldoni, cantautore e cantastorie mantovano, si è prodotto in un lungo monologo, riuscendo a catturare l'attenzione dei ragazzi sui problemi della sicurezza stradale.</p>
            <p>Il racconto ha messo al centro alcuni giovani che, alla fine, vedono premiata la loro prudente scelta di stare lontani dai pericoli notturni della strada. Sono infatti all'ordine del giorno gli innumerevoli e tragici incidenti nei quali tanti giovani perdono la vita durante i weekend.</p>
            <div class="mt-8 grid grid-cols-1 gap-4">
                <figure>
                    <img src="Notizie/services-giovani-goldoni.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                    <figcaption class="mt-2 text-sm text-gray-500 italic">Da sinistra, Enzo Ragazzi si congratula con Daniele Goldoni, attore.</figcaption>
                </figure>
            </div>
        `
    },
            {
                title: "Visita della Governatrice Teresa Filippini al Lions Club Mirandola: riconoscimenti e spirito \"We Serve\"",
                date: "29 Apr 2026",
                category: "rassegna-stampa",
                tag: "Rassegna Stampa",
                tagClass: "bg-[#FFC72C]/10 text-[#b58600]",
                cardClass: "cat-rassegna-stampa",
                img: "Notizie/Lions-Aprile-2026-copertina-800x445.jpg",
                excerpt: "Il 28 Aprile 2026 il Lions Club Mirandola ha avuto il piacere di accogliere in visita ufficiale la Governatrice del Distretto 108 TB, Teresa Filippini...",
                content: `
                    <p>Il 28 Aprile 2026 il Lions Club Mirandola ha avuto il piacere di accogliere in visita ufficiale la Governatrice del Distretto 108 TB, Teresa Filippini, accompagnata dal suo staff, nella suggestiva cornice di Villa Fondo Tagliata.</p>
                    <p>A seguito della visita ispettiva, il Club ha ricevuto un sentito plauso per l'ottimo spirito organizzativo, per le numerose attività svolte sul territorio e per il numero di soci in costante crescita. Un riconoscimento importante che conferma l'impegno e la vitalità del gruppo.</p>
                    <p>La serata è poi proseguita con una conviviale all'insegna dell'amicizia, durante la quale sono stati condivisi saluti e ringraziamenti reciproci per il lavoro svolto, sempre guidati dal principio che accomuna tutti i Lions: We Serve.</p>
                    
                    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <img src="Lions-Aprile-2026-1-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-2-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-3-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-4-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-5-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-7-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-8-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                        <img src="Lions-Aprile-2026-9-1024x768.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                    </div>
                `
            },
            {
                title: "Il Lions Club Mirandola al Lions Day",
                date: "12 Apr 2026",
                category: "rassegna-stampa",
                tag: "Rassegna Stampa",
                tagClass: "bg-[#FFC72C]/10 text-[#b58600]",
                cardClass: "cat-rassegna-stampa",
                img: "lions-day-mirandola-800x445.jpg",
                excerpt: "Il Lions Club Mirandola ha tenuto il suo Lions Day istallando l'ospedale da campo\" in piazza Costituente di Mirandola...",
                content: `
                    <p>Il Lions Club Mirandola ha tenuto il suo Lions Day istallando l'ospedale da campo" in piazza Costituente di Mirandola che ha consentito lo svolgimento di uno screening gratuito della salute offerto ai cittadini, nella mattinata di domenica 12 aprile.</p>
                    <p>Lo screening è consistito nella misura della pressione arteriosa e della glicemia, con l'esecuzione dell'ecografia tiroidea e la verifica dell'ambliopia nei bambini.</p>
                    <p>Col coinvolgimento di più di venti soci del Club e di alcuni medici specialisti (anch'essi soci Lions e nn) e col supporto delle strutture delle associazioni AVIS, AMO e Meneco' di Medolla, sono state esamine circa 200 persone (55% donne e 45% uomini) riscontrando in alcune di esse problemi occulti che ne hanno consigliato l'invio per ogni ulteriore approfondimento ai medici curanti.</p>
                    <p>Il Lions Day ha altresì permesso l'esecuzione di un importante service destinando all'AVIS (che lo ha vinto nel sorteggio con l'AMO) il ricavato della vendita, avvenuta durante la mattinata, delle splendide piantine fiorite offerte dalla ditta Vivai Morselli di Medolla.</p>
                `
            },
            {
                title: "Al Lions si discute sui danni nei giovani dovuti dalla digitalizzazione",
                date: "31 Mar 2026",
                category: "prima-pagina",
                tag: "Prima Pagina",
                tagClass: "bg-[#034EA2]/10 text-[#034EA2]",
                cardClass: "cat-prima-pagina",
                img: "IMG_20260324_230429455_HDR-800x445.jpg",
                excerpt: "Il 24 marzo u.s. si è svolta presso la sala conviti della polisportiva quarantolese la serata del LC Mirandola dedicata ai problemi provocati nei giovani...",
                content: `
                    <p>Il 24 marzo u.s. si è svolta presso la sala conviti della polisportiva quarantolese la serata del LC Mirandola dedicata ai problemi provocati nei giovani dall’abuso delle moderne tecnologie digitali (in primis: il telefonino, il personal computer e i relativi software). Ospite d’onore è stato il Dott. Thamianos Fanos, psichiatra e allievo del prof. Vittorino Andreoli. E’ stato responsabile del reparto di psichiatria dell’ospedale di Pieve di Coriano fino a qualche tempo fa e attualmente esercita la libera professione in provincia di Mantova. Il Dott. Fanos è un esperto della materia: “Giovani, tecnologie e ritiro sociale” (tema dell’incontro) e ha una lunga esperienza con le patologie nei giovani dovute alle loro interazioni con i moderni mezzi di comunicazione.</p>
                    <p>La serata è vissuta anche su un’ottima cena preparata dai risottari di Villimpenta ai quali va il plauso dei commensali per il loro piatto tradizionale: il gustosissimo riso alla pilotta servito con le costine di maiale (il “puntel”).</p>
                    <p>Il Dott. Fanos, presentatosi in un abito assolutamente anticonvenzionale, per giustificare il suo spirito “ribelle” ha premesso il suo intervento con un aneddoto di quando tempo fa in ospedale era stato scambiato (sempre a causa della sua eccentricità) per un ricoverato del reparto psichiatrico e dovette faticare non poco per farsi riconoscere, invece, come medico del reparto: le apparenze talvolta ingannano! Ai presenti della serata è quindi bastato poco per capire che il relatore, nonostante l’aspetto esteriore, era lo psichiatra, piuttosto che un suo paziente.</p>
                    <p>Introdotto dal socio Lions Nunzio Borelli, il  Dott. Fanos ha spiegato che il cervello degli adolescenti è molto diverso da quello degli adulti.  L’età dai 9 ai 15 anni è quella in cui avvengono le grandi trasformazioni che si completano più avanti nella vita. In quel periodo, il ragazzo è preda di grandi emozioni, si entusiasma per le cose nuove, è alla ricerca del piacere, ma la parte inibitrice (cioè, quella che lo “frena”) si svilupperà in lui solo più tardi: in sua assenza, deve essere esercitata dalla famiglia. Quando, però, il freno inibitore “famigliare” manca, può capitare che l’adolescente si avvicini, per esempio, alle droghe. Se ciò avviene molto presto, la parte inibitoria del giovane non si svilupperà mai più ed egli sarà rovinato per sempre. </p>
                    <p>Poi le differenze con gli adulti si acuiscono anche per altri motivi. Gli adulti vengono da generazioni in cui si allenava la memoria a lungo termine con date, numeri di telefono, definizioni mnemoniche, ecc. A questo proposito, il relatore afferma che i taxisti di Londra sono tra coloro che hanno la memoria più sviluppata perché devono ricordare i nomi di tutte le strade della città. I giovani invece non memorizzano l’informazione, ma iniziano a memorizzare dove trovarla. Non ricordano cosa sia successo in una certa data, ma sanno esattamente come recuperare ciò in pochi secondi sullo smartphone, per esempio, passando velocemente da tik-tok a Whatsapp, poi a una ricerca su Wikipedia e di nuovo alla musica, ecc. Questo multitasking è una caratteristica degli adolescenti di oggi che finisce per fornire dati solo alla memoria a breve, mentre quella a lungo termine ne viene esclusa. I giovani hanno la capacità di scremare velocemente grandi quantità di dati, ma fanno molta fatica a mantenere l'attenzione su un singolo compito per un lungo periodo. </p>
                    <p>Oltre al rischio che il pensiero critico non si sviluppi (per connettere fra loro due idee bisogna averle salvate in testa, non su uno schermo!), ciò comporta anche tutta una serie di patologie di natura “digitale”, fra cui si ricordano, per citarne solo alcune: ansietà, dipendenza, deprivazione del sonno, ritiro sociale. In quest’ultima, molto grave, il giovane si isola completamente dal mondo fisico per vivere esclusivamente in quello digitale. In Giappone questi ragazzi, di solito appartenenti a famiglie ricche, si chiamano Hikikomori e si stima che siano più di 1 milione. Anche la depressione, dovuta alla preoccupazione per il futuro del pianeta, all’incertezza del lavoro e alla vetrina costante di vite perfette proposte dai social media, trova il suo terreno fertile nell’era “digitale”: molti suicidi fra i giovani nascono da essa. </p>
                    <p>La stessa sessualità è oggetto di profondi cambiamenti. Mentre gli adulti delle passate generazioni erano legati all’identità binaria (ossia: maschio e femmina), le ultime generazioni (millennials e generazione Alpha) si sentono o entrambi, o nessuno dei due, o qualcosa di fluido. In conclusione, la relazione del Dott. Fanos ha spiegato i gravi danni causati dalle “patologie digitalmente correlate” sui giovani, ma ora alle famiglie e a tutta la società spetta il compito di mettere in atto adeguate strategie di prevenzione e protezione.  I.P.</p>

                        <img src="IMG_20260324_225233150_HDR-768x1024.jpg" class="${imgClasses}" onclick="openLightbox(this.src)">
                    </div>
                `

            {
                title: "Al Lions Club Mirandola l'intermeeting su: “HIV-AIDS 2026: ha ancora senso parlarne?”",
                date: "04 Mar 2026",
                category: "prima-pagina",
                tag: "Prima Pagina",
                tagClass: "bg-[#034EA2]/10 text-[#034EA2]",
                cardClass: "cat-prima-pagina",
                img: "IMG_20260224_231036037_HDR-1-800x445.jpg",
                excerpt: "Notevole interesse ha suscitato la serata del Lions Club Mirandola in inter-meeting con i Club Lions di Finale Emilia e Castelfranco Emilia...",
                content: `
                    <p>Notevole interesse ha suscitato la serata del Lions Club Mirandola in inter-meeting con i Club Lions di Finale Emilia e Castelfranco Emilia lo scorso 24 febbraio, in cui è stato ospitato, quale illustre relatore Guido Poli, professore ordinario di patologia all'Università Vita-Salute S. Raffaele (Milano) ed esperto virologo con alle spalle una lunga esperienza di lavoro col prof. Anthony Fauci, di Bethesda negli Usa. Il prof. Poli è originario di Poggio Rusco, dove ama tornare di tanto in tanto per trovare gli amici di un tempo, fra i quali anche Enzo Ragazzi, attuale presidente del LC Mirandola.</p>
                    <p>L'argomento toccato nella sua relazione riguarda il calo di attenzione mediatica sull'AIDS che non coincide affatto con la scomparsa del virus HIV (virus dell'immunodeficienza umana) che lo causa e che rappresenta ancora una formidabile sfida per la salute pubblica mondiale. Il professore ha ricordato la scoperta del virus HIV avvenuta nel 1983 e la dimostrazione che esso è l'unica causa dell'AIDS, nel 1984. Il virus HIV nasce in Africa Centrale (Zaire/Ruanda), dove i primi studi evidenziarono la sua origine confinata agli scimpanzé, animali macellati e destinati all'alimentation. La contaminazione degli africani con quel virus avvenne quindi facilmente.</p>
                    <p>Poi nella storia più recente, il virus ebbe un passaggio ad Haiti, molto frequentata negli anni 70 dagli omosessuali americani che lo portarono in USA e da qui esso si sparse in tutto il mondo. Da quel momento, si cominciò a chiamarlo col nome attuale di HIV: un nuovo tipo di virus, un retrovirus, che, una volta acquisito, non si può più eliminare dall'organismo umano. Le possibilità di contagio avvengono soprattutto per via sessuale e in minima parte per effetto di trasfusioni di sangue, o consumo di eroina, oppure per trasmissione da madre a feto/bambino.</p>
                    <p>L'infezione con HIV, se non trattata con farmaci, è letale in oltre il 95% dei casi. Essa ha una fase iniziale di manifestazione entro i primi 2-3 mesi dal contagio, seguita da una lunga latenza clinica di 8-10 anni durante i quali il contagiato conduce vita pressoché normale. Comincia poi la fase terminale (di 1-2 anni) di vero AIDS conclusa con la morte. Dal 1996, però, è stata introdotta la terapia antiretrovirale di combinazione (cART) in seguito alla quale le morti per AIDS sono andate drasticamente calando. In particolare, rispetto al 2010, mentre le persone infettate nel mondo con l'HIV sono aumentate del 25%, le morti sono calate del 51% per anno, assieme al numero di nuove infezioni, anch'esse calate del 39% per anno.</p>
                    <p>Tutto ciò è avvenuto grazie alla terapia cART che nel tempo è migliorata, diventando meno gravosa per gli infettati, con la progressiva riduzione (da 30 a 2) delle compresse da assumere ogni giorno. La cART ha realizzato oggigiorno la situazione U=U che significa Undetectable=Untransmissible, ossia se la carica virale nel sangue di una persona infettata con l'HIV non è rilevabile, allora quella persona, se in terapia, può concepire figli senza il rischio d'infettare il partner. Non esiste, però, un vaccino contro l'HIV. La ragione sta nel fatto che il nostro sistema immunitario non è in grado di eliminarlo, in quanto il virus è estremamente variabile e si nasconde nel DNA delle cellule infettate. Il contagio può essere evitato innanzitutto con la protezione nei rapporti sessuali, oppure, quando essa non sia stata adottata e si nutrano dubbi sull'eventualità del contagio, si può ricorrere a una profilassi preventiva che si fa abitualmente con farmaci da assumere per via orale su base quotidiana.</p>
                    <p>Nonostante i progressi della scienza medica e farmacologica, in Italia si registrano ancora oltre 2300 nuove diagnosi di HIV all'anno (nel 2024), con trasmissione soprattutto per via sessuale. Tutti i rapporti sessuali non protetti con persone che non si conoscono sono potenzialmente a rischio: maggiore nel rapporto anale e minore in quello orale. Un test effettuato entro 2-3 giorni da un rapporto a rischio consente di valutare se sottoporsi, o meno, alla profilassi post-esposizione temporanea con farmaci cART.</p>
                    <p>L'amara conclusione del professore è che nel 1980-90 non c'erano i social, ma se ne parlava di più, c'era più attenzione all'educazione sessuale e ai rischi della vita sessuale promiscua. Dopo l'avvento della cART (dal 1996 in poi) l'infezione da HIV e l'AIDS sono state considerate erroneamente malattie curabili e quindi derubricate dall'agenda politica, ma è bene tenere presente che "il nemico più pericoloso è quello a cui nessuno pensa" (citando la frase da "Angeli e Demoni" di Dan Brown) ed essere prudenti. La serata si è conclusa con l'ingresso nel Lions Club Mirandola di un nuovo socio: Gianni Sprea, accolto con un caloroso applauso di benvenuto. I.P.</p>

                    </div>
                `
            },

            {
                title: "“Fare memoria a partire da Fossoli”. I Lions Club Finale E. e Mirandola ricordano la Shoah",
                date: "02 Feb 2026",
                category: "rassegna-stampa",
                tag: "Rassegna Stampa",
                tagClass: "bg-[#FFC72C]/10 text-[#b58600]",
                cardClass: "cat-rassegna-stampa",
                img: "Unknown-800x445.jpg",
                excerpt: "In occasione della imminente ricorrenza del \"Giorno della Memoria\", si è svolto lo scorso 22 gennaio un intermeeting fra i Lions Club...",
                content: `
                    <p>In occasione della imminente ricorrenza del "Giorno della Memoria", si è svolto lo scorso 22 gennaio un intermeeting fra i Lions Club di Finale Emilia (Club organizzatore) e di Mirandola, presso il ristorante "Il Cacciatore" di S. Felice sul Panaro. La serata, molto partecipata dai soci dei due Club, ha avuto come relatrice la prof.ssa Elena Romagnoli, insegnante di lettere presso il Liceo scientifico "M. Morandi" di Finale Emilia, che ha affrontato il delicato e toccante tema: "Fare memoria a partire da Fossoli".</p>
                    <p>La relatrice ha esordito ricordando la frase di Primo Levi, scritta all'ingresso del Campo di Fossoli (Carpi): "Quanti sanno che Fossoli... è stato il punto di partenza per l'inferno?". Nel dopoguerra, infatti, l'oblio è caduto su Fossoli che fu utilizzato dapprima come campo per profughi stranieri e poi per ospitare i ragazzi di don Zeno Saltini (Nomadelfia) e successivamente i profughi istriano-dalmati (il villaggio S. Marco), fino alla definitiva chiusura nel 1970. Fu solo nel 1984, grazie alla nascita della Fondazione Fossoli, che si iniziò il ricupero delle baracche e la conservazione della memoria storica del luogo.</p>
                    <p>La storia di Fossoli inizia nel maggio del 1942, quando l'esercito italiano vi stabilisce un campo di prigionia per militari alleati (inglesi in particolare) catturati in Africa Settentrionale, arrivando a contenerne fino a 5000 in baracche prefabbricate in legno. Dopo l'8 settembre 1943, il campo viene occupato dai tedeschi e diviene un campo di transito diretto dalle SS, destinato alla concentrazione degli ebrei e degli oppositori politici italiani da avviare alla deportazione nei lager del Nord Europa (Auschwitz, Dachau, Mauthausen, Ravensbruck, Bergen-Belsen). Da Fossoli sono partiti circa 5000 deportati (di cui la metà ebrei) stipati in vagoni piombati merci alla stazione ferroviaria di Carpi, e fra questi anche Primo Levi (partito il 22 febbraio 1944) che descriverà quella tragica esperienza nelle prime pagine del suo celebre libro "Se questo è un uomo".</p>
                    <p>La prof.ssa Romagnoli ha poi proiettato alcune significative immagini del Campo e delle baracche, sottolineando l'importanza di Fossoli come "luogo di memoria", ossia uno spazio fisico in cui la storia si fa concreta e visibile, e che costituisce un formidabile strumento educativo per le giovani generazioni affinché eventi così tragici non debbano mai più ripetersi. Al termine dell'applauditissimo intervento, i Presidenti dei due Club, Maria Vittoria Baraldini (Finale Emilia) ed Enzo Ragazzi (Mirandola), hanno espresso il profondo ringraziamento alla relatrice consegnandole il guidoncino ufficiale del Club. I.P.</p>
                `
            },

                content: `
                    <p>La tradizionale “Serata degli Auguri” del Lions Club Mirandola si è tenuta quest’anno il 16 dicembre presso Villa Fondo Tagliata, in un’atmosfera di serenità e speranza in un futuro migliore, anche se le guerre che avvelenano i rapporti fra gli uomini non sono ancora approdate alla tanto agognata pace. Nel suo intervento iniziale il presidente Enzo Ragazzi ha ricordato i principali conflitti che ci affliggono, augurandosi che la disposizione a servire di chi è nel bisogno (caratteristica propria dei Lions) venga adottata a tutti i livelli nei rapporti umani all’interno e all’esterno della nostra società, affinchè la legge del bene finalmente trionfi su quella del male. La serata ha avuto la presenza di alcuni ospiti di riguardo: D. Fabio Barbieri, parroco di Mirandola, i presidenti dei Lions Clubs viciniori (Finale E., Castelfranco E. e Carpi Host) e del presidente del Rotary Club Mirandola ed è vissuta su un importante service del Lions Club Mirandola. In particolare si è trattato della donazione di uno scooter cabinato, ad azionamento elettrico con batteria ricaricabile e autonomia di 20km, avente una velocità massima di 16kmh, appartenente alla famiglia del Dott. Bruno Zanzani, socio dapprima effettivo e poi onorario del Club mirandolese (per oltre mezzo secolo, recentemente scomparso alla bella età di 99 anni) e utilizzato dallo stesso negli ultimi anni di vita per i suoi spostamenti fuori casa. Dopo la sua scomparsa, la famiglia ha deciso di donare lo scooter ad una persona con problemi di mobilità che ne avesse potuto trarre profitto. Il Club, in ricordo del Dott. Zanzani, si è preso carico di rimettere a nuovo il mezzo, mostrandolo durante la serata e trovando nella parrocchia Santa Maria Maggiore di Mirandola l’ente che avrebbe potuto individuare un suo nuovo possibile destinatario. Così è stato, per cui si è proceduto alla consegna dello scooter al parroco D. Fabio che a sua volta lo metterà presto a disposizione del destinatario. Invitato a parlare, dopo aver ringraziato il Club, D. Fabio ha preso spunto dalla donazione dei Lions per richiamare il profondo significato del Natale imminente, nel quale il mistero della nascita di Gesù fronteggia silenziosamente la rumorosa distruzione della morte, annunciando gloria in cielo e pace sulla terra. Di qui, l’invito a non lasciarsi travolgere dagli orizzonti cupi che il mondo ci presenta oggi. Si è proceduto infine alla lettura della comunicazione ricevuta dalla sede centrale del Lions Clubs International (Oak Brook, Illinois, USA) con la quale al Lions Club Mirandola è stato attribuito, per il secondo anno consecutivo, il “Premio Soddisfazione Soci”, in riconoscimento dell’impegno nelle attività di service e nell’immissione di nuovi soci. Un caloroso brindisi finale con gli auguri di BUONE FESTE a tutti ha concluso la piacevole serata, allietata anche da bei canti e celebri brani del Natale.  I.P.</p>

                    <p>Un nuovo importante strumento entra in servizio al Centro Dialisi dell'Ospedale di Mirandola, diretto dalla dottoressa Simonetta Cimino, grazie alla generosa donazione del Lions Club Mirandola: si tratta di un ecografo wireless, pensato per il monitoraggio degli accessi vascolari nei pazienti in emodialisi. L'ecografo permetterà di controllare accuratamente lo stato della fistola artero-venosa (FAV), evitando interventi chirurgici invasivi maggiori e riducendo drasticamente le complicanze cliniche. Il personale infermieristico sarà formato all'utilizzo del dispositivo da parte di un operatore già esperto attivo nella rete nefrologica provinciale.</p>

        // Funzione per generare dinamicamente le card HTML all'avvio
        function generateNewsTimeline() {
            const container = document.getElementById('newsTimelineContainer');
            container.innerHTML = ""; 

            newsDatabase.forEach((news, index) => {
                const cardHtml = `
                    <div class="news-card ${news.cardClass}" data-category="${news.category}" onclick="openNews(${index})">
                        <div class="news-img-wrapper">
                            <img src="${news.img}" alt="${news.title}">
                        </div>
                        <div class="flex flex-col justify-between p-6 md:p-8 flex-1">
                            <div>
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="text-xs font-bold px-3 py-1 ${news.tagClass} rounded-full uppercase tracking-wider">${news.tag}</span>
                                    <span class="text-xs text-gray-400 font-semibold">${news.date}</span>
                                </div>
                                <h3 class="news-title text-xl md:text-2xl font-extrabold uppercase tracking-tight text-[#0d0c22] mb-3 leading-snug transition-colors duration-300">
                                    ${news.title}
                                </h3>
                                <p class="text-gray-500 font-medium text-sm md:text-[15px] leading-relaxed line-clamp-2">
                                    ${news.excerpt}
                                </p>
                            </div>
                            <div class="mt-4 flex items-center text-xs font-bold ${String(news.category || '').trim() === 'prima-pagina' ? 'text-[#034EA2]' : 'text-[#b58600]'} tracking-wider uppercase gap-1">
                                Leggi l'articolo →
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        generateNewsTimeline();

        // Filtri
        function filterFeed(category, btnElement) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            const cards = document.querySelectorAll('.news-card');
            cards.forEach(card => {
                const cardCategory = String(card.getAttribute('data-category') || '').trim();
                if (category === 'all' || cardCategory === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Apertura Notizia
        function openNews(index) {
            const data = newsDatabase[index];
            document.getElementById('modalTag').innerText = data.tag;
            document.getElementById('modalTag').className = `text-xs font-bold px-4 py-1.5 rounded-full uppercase tracking-wider ${data.tagClass}`;
            document.getElementById('modalDate').innerText = data.date;
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalImg').src = data.img;
            document.getElementById('modalContent').innerHTML = data.content;

            const overlay = document.getElementById('detailOverlay');
            const modal = document.getElementById('detailModal');
            
            overlay.classList.remove('pointer-events-none', 'opacity-0');
            modal.classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden';
        }

        // Chiusura Notizia
        function closeNews() {
            const overlay = document.getElementById('detailOverlay');
            const modal = document.getElementById('detailModal');
            
            overlay.classList.add('pointer-events-none', 'opacity-0');
            modal.classList.add('translate-x-full');
            document.body.style.overflow = '';
        }

        // --- SISTEMA LIGHTBOX ---
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            const lb = document.getElementById('imageLightbox');
            lb.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeLightbox() {
            const lb = document.getElementById('imageLightbox');
            lb.classList.add('opacity-0', 'pointer-events-none');
        }
    </script>
