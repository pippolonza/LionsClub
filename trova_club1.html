        /* ==========================================================================
           HEADER COMPLETAMENTE INVARIATO (NON TOCCARE - COME DA RICHIESTA)
           ========================================================================== */
        .top-yellow-bar {
            background-color: #FFC82E;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 12px;
            font-weight: 800;
        }
        .top-yellow-bar .left-text { text-transform: none; }
        .top-yellow-bar .header-brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .top-yellow-bar .header-brand img {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            display: block;
        }
        .top-yellow-bar .right-links { display: flex; gap: 20px; text-transform: uppercase; }

        .main-nav {
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-links { display: flex; gap: 8px; }
        .nav-item {
            border: 2px solid #000;
            border-radius: 50px;
            padding: 7px 18px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #000;
            transition: 0.2s;
        }
        .nav-item.active { background: black; color: white; }
        .nav-item:hover:not(.active) { background: #f8f8f8; }

        .right-btns { display: flex; gap: 12px; align-items: center; }
        .btn-lilla { background: #D6C6F9; padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .btn-gold { background: #FFC82E; padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }

        /* Animazione più morbida e delicata del cuore al passaggio del mouse */
        .btn-gold:hover .animated-heart {
            animation: heartbeat-soft 1s infinite ease-in-out;
        }

        @keyframes heartbeat-soft {
            0% { transform: scale(1); }
            20% { transform: scale(1.12); }
            40% { transform: scale(1); }
            60% { transform: scale(1.08); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }


        /* ==========================================================================
           INTERFACCIA APP: MASSIMO STILE FIGMA HOMEPAGE
           ========================================================================== */
        .app-container { display: flex; height: calc(100vh - 127px); background-color: #0B0F19; }
        
        .sidebar { 
            width: 430px; 
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            z-index: 10;
            color: #0F172A;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.3);
        }

        .search-area { 
            padding: 34px 24px; 
            background: #ffffff; 
            border-bottom: 1px solid #E2E8F0;
        }
        .search-area h2 { 
            font-weight: 800; 
            font-size: 26px; 
            margin-bottom: 18px; 
            color: #0F172A; 
            letter-spacing: -0.7px; 
        }
        
        .search-wrapper { position: relative; }
        .search-input { 
            width: 100%; 
            padding: 15px 20px 15px 50px; 
            border-radius: 20px; 
            border: 1px solid #CBD5E1; 
            background: #F8FAFC;
            color: #0F172A;
            outline: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .search-input:focus { 
            border-color: #FFC82E; 
            background: #ffffff;
            color: #0F172A;
            box-shadow: 0 10px 25px rgba(255, 200, 46, 0.15);
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B; z-index: 12;
            pointer-events: none;
            transition: all 0.3s;
        }
        .search-input:focus + .search-icon {
            color: #0F172A;
        }

        .club-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 24px 20px; 
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #ffffff;
        }
        
        .club-list::-webkit-scrollbar { width: 6px; }
        .club-list::-webkit-scrollbar-track { background: transparent; }
        .club-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* CARD STILE "BENTO" DELLA HOME: Volumi definiti e alternanza cromatica */
        .club-item {
            position: relative;
            padding: 24px;
            border-radius: 24px; 
            background: #F8FAFC; 
            border: 1px solid #000000;
            cursor: pointer;
            color: #0F172A; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 10px 20px rgba(0, 0, 0, 0.03);
        }
        
        .club-item:hover { 
            transform: translateY(-6px) scale(1.015);
            background: #ffffff;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.4), 0 4px 15px rgba(214, 198, 249, 0.15);
            border-color: #cbd5e1;
        }

        .club-item h3 { 
            font-weight: 800; 
            color: #0B0F19; 
            margin-bottom: 10px; 
            font-size: 18px; 
            letter-spacing: -0.4px;
            padding-right: 90px; /* Lascia spazio al link rapido a destra */
        }
        
        .club-item p { 
            font-size: 13.5px; 
            color: #475569; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 600;
        }
        
        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: #E9E3FF;
            border-radius: 8px;
            color: #7C3AED;
            transition: all 0.3s ease;
        }
        .club-item:hover .icon-box {
            background: #7C3AED;
            color: #0F172A;
            transform: scale(1.1) rotate(-8deg);
        }
        
        /* Tag Giallo Oro coordinato con il bottone "DONA" */
        .club-tag-gold { 
            display: inline-block; 
            margin-top: 16px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #0F172A; 
            background: #FFC82E; 
            padding: 6px 14px; 
            border-radius: 50px; 
            letter-spacing: 0.6px;
            box-shadow: 0 2px 4px rgba(255, 200, 46, 0.2);
        }

        /* ELEMENTO INTERESSANTE NEL RETTANGOLO VERDE: Bottone Link Rapido Bento */
        .club-quick-link {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background: #000000;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 1px solid #000000;
        }
        .club-item:hover .club-quick-link {
            background: #ffffff;
            color: #0F172A;
            border-color: #0F172A;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        #map { flex: 1; background-color: #0B0F19; }

        /* POPUP MAPPA */
        .leaflet-popup-content-wrapper { 
            border-radius: 24px; 
            padding: 14px; 
            box-shadow: 0 30px 60px rgba(11, 15, 25, 0.25);
            border: 1px solid #e2e8f0;
            background: #ffffff;
        }
                .popup-card {

            font-family: 'Inter', sans-serif;
            min-width: 190px;

        .popup-card h4 { 
            color: #0F172A; 
            font-weight: 800; 
            margin: 0 0 6px 0; 
            font-size: 15px; 
            letter-spacing: -0.5px;
            line-height: 1.3;
            text-transform: uppercase;

        .popup-card p {

            color: #475569; 
            margin: 0 0 14px 0; 
            line-height: 1.5;
            font-weight: 500;

            color: #0F172A;
            font-weight: 700;
        }

            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            color: #000000; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 11px; 
            text-transform: uppercase;
            letter-spacing: 0.3px;
            background: #FFC82E;
            padding: 9px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid #FFC82E;
            box-sizing: border-box;
            text-align: center;
        }
        .popup-card a:hover {
            background: #E6B422;
            border-color: #E6B422;
        }

            padding: 6px !important;

        .leaflet-popup-content {
            margin: 12px 14px !important;
            line-height: 1.4 !important;
        }
        .leaflet-popup-close-button {
            padding: 8px 8px 0 0 !important;
            color: #94A3B8 !important;
        }
        .popup-card a:hover { 
            background: #FFC82E; 
            color: #0f172a;

        // Definizione dei confini massimi visualizzabili (Italia allargata) per evitare l'effetto pac-man
        const southWest = L.latLng(35.0, 5.0);
        const northEast = L.latLng(48.0, 20.0);
        const bounds = L.latLngBounds(southWest, northEast);

        // Inizializzazione mappa centrata sull'Italia con limiti rigidi anti-ripetizione
        const map = L.map('map', { 
            zoomControl: false,
            minZoom: 5,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0
        }).setView([42.0, 12.5], 6); // Centrato sul centro Italia, zoom ideale nazionale
        
        L.control.zoom({ position: 'topright' }).addTo(map);
        
        // noWrap: true impedisce la duplicazione orizzontale dei tasselli della mappa (effetto pac-man)
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            noWrap: true,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const listContainer = document.getElementById('clubList');
        const searchInput = document.getElementById('searchInput');
        const clubCounter = document.getElementById('clubCounter');
        let markers = [];

        function renderClubs(searchTerm = "") {
            listContainer.innerHTML = "";
            const filteredClubs = clubs.filter(club => 
                club.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                club.city.toLowerCase().includes(searchTerm.toLowerCase())
            );

            clubCounter.textContent = `${filteredClubs.length} CLUB`;

            filteredClubs.forEach(club => {
                const markerObj = markers.find(m => m.clubName === club.name);
                const marker = markerObj ? markerObj.leafletMarker : null;

                const card = document.createElement('div');
                card.className = 'club-item';
                
                const linkText = club.site !== "#" ? "Sito Web ↗" : "Info ↗";

                card.innerHTML = `
                    ${!club.site.includes("lions.it/club/?id=") ? `<a href="${club.site}" target="_blank" class="club-quick-link" onclick="event.stopPropagation();">${linkText}</a>` : ""}
                    <h3>${club.name}</h3>
                    <p>
                        <span class="icon-box">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        </span>
                        ${club.city}, ${club.country}
                    </p>
                    <div>
                        <span class="club-tag-gold">Lions Club</span>
                    </div>
                `;
                
                card.onclick = () => {
                    if (marker) {
                        // Prima spostiamo la mappa fluidamente sul punto e poi apriamo il cluster in maniera integrata
                        map.flyTo([club.lat, club.lng], map.getZoom() < 12 ? 12 : map.getZoom(), {
                            animate: true,
                            duration: 0.8
                        });
                        setTimeout(() => {
                            markersGroup.zoomToShowLayer(marker, () => {
                                marker.openPopup();
                            });
                        }, 400);
                    }
                };
                listContainer.appendChild(card);
            });

            if(filteredClubs.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:40px 20px; font-weight:500;">Nessun club corrisponde alla ricerca.</div>`;
            }
        }


        // Icona personalizzata puntina Viola Lavanda
        const lavenderIcon = L.divIcon({
            html: `<svg width="32" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="#7C3AED" stroke="#ffffff" stroke-width="1.5"/>
                    <circle cx="12" cy="9" r="3" fill="#ffffff"/>
                   </svg>`,
            className: 'custom-lavender-pin',
            iconSize: [32, 42],
            iconAnchor: [16, 42],
            popupAnchor: [0, -40]
        });

        // Inizializza il gruppo di cluster personalizzato per mantenere sempre le puntine
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            spiderfyOnMaxZoom: true,
            animate: true,
            animateAddingMarkers: true,
            animationDuration: 350, // Rende la transizione visiva dello zoom e apertura dei gruppi fluidissima
            chunkedLoading: true, // Evita microscatti nel caricamento degli elementi
            iconCreateFunction: function (cluster) {
                const count = cluster.getChildCount();
                // Centratura millimetrica: usiamo display flex centrato all'interno del contenitore della puntina viola
                return L.divIcon({
                    html: `<div style="position: relative; width: 36px; height: 46px; display: flex; justify-content: center;">
                            <svg width="36" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position: absolute; top:0; left:0;">
                                <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="#7C3AED" stroke="#ffffff" stroke-width="1.5"/>
                            </svg>
                            <span style="position: absolute; top: 9px; left: 0; width: 36px; text-align: center; color: white; font-size: 11px; font-weight: 800; font-family: 'Inter', sans-serif; z-index: 5; line-height: 1;">${count}</span>
                           </div>`,
                    className: 'custom-lavender-cluster',
                    iconSize: [36, 46],
                    iconAnchor: [18, 46]
                });
            }
        });

        
        const goldIcon = L.divIcon({
            html: `<div style="position: relative; width: 36px; height: 46px;">
                    <svg viewBox="0 0 24 24" width="36" height="46" style="position: absolute; top:0; left:0;">
                        <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="#FFC82E" stroke="#ffffff" stroke-width="1.5"/>
                    </svg>
                   </div>`,
            className: 'custom-gold-marker',
            iconSize: [36, 46],
            iconAnchor: [18, 46],
            popupAnchor: [0, -40]
        });
    
        clubs.forEach(club => {
            const currentIcon = (club.name && club.name.toUpperCase().includes('MIRANDOLA')) ? goldIcon : lavenderIcon;
            const marker = L.marker([club.lat, club.lng], { icon: currentIcon });
            marker.bindPopup(`
                <div class="popup-card">
                    <h4>${club.name}</h4>
                    <p>${club.address}<br><b>${club.city}</b>, ${club.country}</p>
                    ${club.site.includes("lions.it/club/?id=") ? "" : `<a href="${club.site}" target="_blank">Esplora Club →</a>`}
                </div>
            `);
            markersGroup.addLayer(marker);
            markers.push({ clubName: club.name, leafletMarker: marker });
        });

        map.addLayer(markersGroup);

        searchInput.addEventListener('input', (e) => {
            renderClubs(e.target.value);
        });

        renderClubs();
    </script>
    <script src="widget.js?v=privacy-banner-20260611"></script>
</body>
</html>
